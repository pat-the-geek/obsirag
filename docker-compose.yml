services:
  obsirag:
    build: .
    image: obsirag:latest
    container_name: obsirag
    restart: unless-stopped
    ports:
      - "${OBSIRAG_API_PORT:-8080}:8080"
    volumes:
      # Coffre Obsidian — monté en lecture/écriture (insights, synapses, conversations)
      - "${VAULT_PATH}:/vault:rw"
      # Données ObsiRAG : index vectoriel LanceDB, stats, état autolearn…
      - obsirag-data:/app/data
      # Logs — accessible depuis l'hôte pour debug
      - ./logs:/app/logs:rw
    env_file:
      # Variables lues depuis le fichier .env du projet
      - .env
    environment:
      # Chemins INTERNES au container (écrasent les valeurs macOS du .env)
      VAULT_PATH: /vault
      APP_DATA_DIR: /app/data
      LOG_DIR: /app/logs
      # Le worker autolearn tourne en processus séparé via cron :
      # l'API ne doit pas le lancer en interne.
      AUTOLEARN_ALLOW_BACKGROUND_LLM: "false"
      # Fuseau horaire du container aligné sur l'hôte
      TZ: "${TZ:-Europe/Zurich}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  # Volume nommé Docker pour l'index LanceDB et les états persistants.
  # Déclaré external pour conserver le nom exact (sans préfixe de projet)
  # et pour que migrate-data.sh puisse y écrire directement.
  obsirag-data:
    external: true
    name: obsirag-data
