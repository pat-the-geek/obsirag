server {
    listen 80;

    # ── Safari / macOS Dock : icônes servies directement par nginx ─────────────
    location = /favicon-16x16.png {
        alias /static/favicon-16x16.png;
        add_header Content-Type image/png;
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /favicon-32x32.png {
        alias /static/favicon-32x32.png;
        add_header Content-Type image/png;
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /apple-touch-icon.png {
        alias /static/apple-touch-icon.png;
        add_header Content-Type image/png;
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /apple-touch-icon-precomposed.png {
        alias /static/apple-touch-icon.png;
        add_header Content-Type image/png;
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /favicon.ico {
        alias /static/favicon.ico;
        add_header Content-Type image/x-icon;
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /android-chrome-192x192.png {
        alias /static/android-chrome-192x192.png;
        add_header Content-Type image/png;
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /android-chrome-512x512.png {
        alias /static/android-chrome-512x512.png;
        add_header Content-Type image/png;
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /safari-pinned-tab.svg {
        alias /static/safari-pinned-tab.svg;
        add_header Content-Type image/svg+xml;
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /site.webmanifest {
        alias /static/site.webmanifest;
        add_header Content-Type application/manifest+json;
    }

    # ── WebSocket Streamlit ─────────────────────────────────────────────────────
    location /_stcore/stream {
        proxy_pass http://obsirag:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ── Tout le reste → Streamlit, avec injection dans <head> ──────────────────
    location / {
        proxy_pass http://obsirag:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Encoding "";

        sub_filter '</head>' '<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"><link rel="apple-touch-icon-precomposed" sizes="180x180" href="/apple-touch-icon.png"><link rel="mask-icon" href="/safari-pinned-tab.svg" color="#7C3AED"><link rel="manifest" href="/site.webmanifest"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="ObsiRAG"><meta name="theme-color" content="#7C3AED"></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
