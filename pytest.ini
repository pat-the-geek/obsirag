[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --no-header
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=90
    --cov-config=.coveragerc
markers =
    unit: Tests unitaires (rapides, pas de dépendances externes)
    integration: Tests d’intégration (fichiers réels, ChromaDB en mémoire)
    perf: Tests de performance / seuils de vitesse
    slow: Tests lents (modèles NLP, etc.)
    smoke: Vérifications minimales de fumée
    nrt: Suite ultra-courte de non-régression Streamlit (< 10 tests, boucle de dev rapide)
