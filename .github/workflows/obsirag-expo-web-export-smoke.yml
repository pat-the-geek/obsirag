name: ObsiRAG Expo Web Export Smoke

on:
  push:
    paths:
      - 'obsirag-expo/**'
      - '.github/workflows/obsirag-expo-web-export-smoke.yml'
  pull_request:
    paths:
      - 'obsirag-expo/**'
      - '.github/workflows/obsirag-expo-web-export-smoke.yml'

jobs:
  web-export-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: obsirag-expo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: obsirag-expo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run web export smoke test
        run: npm run test:web-export