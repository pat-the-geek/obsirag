name: ObsiRAG Expo Quality

on:
  push:
    paths:
      - 'obsirag-expo/**'
      - '.github/workflows/obsirag-expo-quality.yml'
  pull_request:
    paths:
      - 'obsirag-expo/**'
      - '.github/workflows/obsirag-expo-quality.yml'

jobs:
  typecheck-and-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: obsirag-expo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: obsirag-expo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck Expo app
        run: npm run typecheck

      - name: Run UI tests
        run: npm run test:ui