<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>ObsiRAG</title>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  <link rel="icon" href="/favicon.ico" />  <style id="obsirag-preboot-style">
html, body {
  background: #f4f1ea;
}

body[data-obsirag-booted='true'] #obsirag-preboot {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

#obsirag-preboot {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: #f4f1ea;
  color: #1f160c;
  font-family: "Segoe UI", Helvetica, Arial, sans-serif;
  transition: opacity 180ms ease, visibility 180ms ease;
}

#obsirag-preboot-card {
  width: 100%;
  max-width: 560px;
  border-radius: 24px;
  padding: 28px 24px;
  border: 1px solid #e2d3bd;
  background: #fffaf1;
  box-sizing: border-box;
}

#obsirag-preboot-eyebrow {
  margin: 0 0 12px;
  color: #8a562b;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

#obsirag-preboot-title {
  margin: 0 0 12px;
  font-size: 28px;
  font-weight: 800;
  line-height: 1.2;
}

#obsirag-preboot-copy {
  margin: 0;
  color: #5f4f3c;
  font-size: 15px;
  line-height: 1.5;
}

#obsirag-preboot-meta {
  margin: 14px 0 0;
  color: #8a7c6c;
  font-size: 12px;
  line-height: 1.4;
}
</style>
</head>

  <body>
    <div id="obsirag-preboot" aria-live="polite">
  <div id="obsirag-preboot-card">
    <p id="obsirag-preboot-eyebrow">ObsiRAG</p>
    <h1 id="obsirag-preboot-title">Demarrage en cours</h1>
    <p id="obsirag-preboot-copy">Chargement de l'application web. Si cet ecran reste affiche, un probleme de bootstrap JavaScript bloque le premier rendu.</p>
    <p id="obsirag-preboot-meta">Diagnostic shell v4</p>
  </div>
</div>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  <script src="/_expo/static/js/web/entry-5be2eb754c99a99c253f6c7a963c4c3b.js" defer></script>
  <script id="obsirag-preboot-script">
(() => {
  const body = document.body;
  const root = document.getElementById('root');
  const title = document.getElementById('obsirag-preboot-title');
  const copy = document.getElementById('obsirag-preboot-copy');
  const meta = document.getElementById('obsirag-preboot-meta');
  const bundleScript = document.querySelector('script[src*="/_expo/static/js/web/entry-"]');
  let booted = false;
  let bundleLoaded = false;
  let failureCaptured = false;

  const cleanMessage = (value) => String(value || '')
    .replace(/\s+/g, ' ')
    .trim()
    .slice(0, 240);

  const updateShell = (nextTitle, nextCopy, nextMeta) => {
    if (title) {
      title.textContent = nextTitle;
    }
    if (copy) {
      copy.textContent = nextCopy;
    }
    if (meta && nextMeta) {
      meta.textContent = nextMeta;
    }
  };

  const markBooted = () => {
    if (booted) {
      return;
    }
    booted = true;
    body?.setAttribute('data-obsirag-booted', 'true');
  };

  const rootHasVisibleContent = () => {
    if (!root) {
      return false;
    }

    if (root.children.length > 0) {
      return true;
    }

    return cleanMessage(root.textContent).length > 0;
  };

  const registerFailure = (headline, detail) => {
    if (booted || failureCaptured) {
      return;
    }

    failureCaptured = true;
    updateShell(headline, detail);
  };

  if (rootHasVisibleContent()) {
    markBooted();
  } else if (root) {
    const observer = new MutationObserver(() => {
      if (rootHasVisibleContent()) {
        observer.disconnect();
        markBooted();
      }
    });

    observer.observe(root, {
      childList: true,
      subtree: true,
      characterData: true,
    });
  }

  bundleScript?.addEventListener('load', () => {
    bundleLoaded = true;
    if (!booted && !failureCaptured) {
      updateShell(
        "Initialisation JavaScript",
        "Le bundle web est charge. ObsiRAG attend encore le premier rendu React dans la racine de page.",
        "Diagnostic shell v4 - bundle charge"
      );
    }
  });

  bundleScript?.addEventListener('error', () => {
    registerFailure(
      "Chargement JavaScript interrompu",
      "Le bundle web n'a pas pu etre charge par le navigateur. Verifiez le cache, le reseau local et la console web."
    );
  });

  window.addEventListener('error', (event) => {
    const message = cleanMessage(event.message || event.error?.message || event.filename || "Erreur JavaScript globale pendant le bootstrap.");
    registerFailure("Erreur JavaScript au demarrage", message || "Erreur JavaScript globale pendant le bootstrap.");
  });

  window.addEventListener('unhandledrejection', (event) => {
    const reason = event.reason;
    const message = cleanMessage(reason?.message || reason || "Promesse rejetee sans gestionnaire pendant le bootstrap.");
    registerFailure("Promesse rejetee au demarrage", message || "Promesse rejetee sans gestionnaire pendant le bootstrap.");
  });

  window.setTimeout(() => {
    if (booted || failureCaptured) {
      return;
    }

    if (bundleLoaded) {
      updateShell(
        "Bootstrap bloque",
        "Le bundle web est charge mais aucun rendu React utile n'apparait dans #root. Ouvrez la console du navigateur pour la stack exacte.",
        "Diagnostic shell v4 - React non monte"
      );
      return;
    }

    updateShell(
      "Chargement lent",
      "Le bundle web ne s'est pas encore signale apres plusieurs secondes. Verifiez un cache stale ou une erreur de chargement reseau.",
      "Diagnostic shell v4 - attente bundle"
    );
  }, 6000);
})();
</script>
</body>
</html>
