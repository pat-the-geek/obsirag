    <path d="M 200 148 C 192 158 190 172 196 182" stroke="#a78bfa" stroke-width="5" fill="none"/>
    <path d="M 215 132 C 210 145 212 160 220 168" stroke="#c4b5fd" stroke-width="4" fill="none"/>
    <path d="M 195 210 C 185 222 185 238 192 248" stroke="#a78bfa" stroke-width="5" fill="none"/>
    <path d="M 198 268 C 190 278 190 292 198 300" stroke="#a78bfa" stroke-width="4" fill="none"/>

    <!-- Circonvolutions hémisphère droit -->
    <path d="M 337 175 C 347 185 350 200 344 212" stroke="#a78bfa" stroke-width="5" fill="none"/>
    <path d="M 357 220 C 362 235 357 250 347 258" stroke="#a78bfa" stroke-width="5" fill="none"/>
    <path d="M 347 270 C 350 282 344 295 332 300" stroke="#a78bfa" stroke-width="5" fill="none"/>
    <path d="M 312 148 C 320 158 322 172 316 182" stroke="#a78bfa" stroke-width="5" fill="none"/>
    <path d="M 297 132 C 302 145 300 160 292 168" stroke="#c4b5fd" stroke-width="4" fill="none"/>
